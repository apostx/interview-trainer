name: Release to GitHub Pages

# One Pages site, two builds in one artifact:
#   /      → production: always the latest v* tag
#   /beta/ → staging: the `beta` branch, if it exists
# Both triggers rebuild both, so the root is always the released version and
# /beta/ always mirrors the beta branch. `npm run release:beta` pushes the
# local working state to the beta branch.
on:
  push:
    tags: ["v*"]
    branches: ["beta"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need all tags + the beta branch

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Enable GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # ---------- production build (latest v* tag) ----------
      - name: Check out the production ref
        run: |
          PROD_TAG=$(git tag -l "v*" --sort=-v:refname | head -1)
          echo "Production ref: $PROD_TAG"
          git checkout "$PROD_TAG"

      - name: Install dependencies (prod)
        run: npm ci

      - name: Gates (prod)
        run: npm run test

      - name: Build production
        # Served at the root of the custom domain (interviewtrainer.sallai.cc),
        # so no basePath. If the custom domain is ever removed, restore
        # NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: |
          npm run build
          mkdir -p "$RUNNER_TEMP/site"
          cp -r out/. "$RUNNER_TEMP/site/"

      # ---------- beta build (the beta branch, if present) ----------
      - name: Check for a beta branch
        id: beta_ref
        run: |
          if git rev-parse --verify -q origin/beta >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No beta branch — deploying production only."
          fi

      - name: Build beta
        id: beta_build
        if: steps.beta_ref.outputs.exists == 'true'
        # A broken beta must not block a production release; on a beta push
        # it should fail loudly.
        continue-on-error: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: |
          git checkout --force origin/beta
          rm -rf out .next
          npm ci
          npm run test
          VERSION=$(node -p "require('./package.json').version")
          SHA=$(git rev-parse --short HEAD)
          NEXT_PUBLIC_BASE_PATH=/beta APP_VERSION_LABEL="$VERSION-beta.$SHA" npm run build

      - name: Add beta to the site
        if: steps.beta_build.outcome == 'success'
        run: |
          mkdir -p "$RUNNER_TEMP/site/beta"
          cp -r out/. "$RUNNER_TEMP/site/beta/"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
